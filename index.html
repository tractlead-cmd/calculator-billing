<!DOCTYPE html>
<html>
<head>
  <title>Grocery Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 10px;
    }

    h2 {
      text-align: center;
      margin: 8px 0;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      max-width: 600px;
      margin: 6px auto;
    }

    .label {
      font-weight: bold;
      white-space: nowrap;
      font-size: 14px;
    }

    input {
      padding: 8px;
      font-size: 14px;
      width: 120px;
    }

    .result {
      font-weight: bold;
      color: blue;
      white-space: nowrap;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>🛒 Grocery Calculator</h2>

<!-- 1 KG PRICE -->
<div class="row">
  <div class="label">1️⃣ KG Price</div>
  <input id="kgPrice" type="number" placeholder="₹/kg" />
</div>

<!-- ₹ TO GRAMS -->
<div class="row">
  <div class="label">2️⃣ ₹ → Grams</div>
  <input id="money" type="number" placeholder="₹ amount" />
  <div class="result" id="mwResult"></div>
</div>

<!-- GRAMS TO ₹ -->
<div class="row">
  <div class="label">3️⃣ Grams → ₹</div>
  <input id="grams" type="number" placeholder="grams" />
  <div class="result" id="wmResult"></div>
</div>

<script>

function getKgPrice() {
  return parseFloat(document.getElementById("kgPrice").value);
}

/* ₹ → grams */
document.getElementById("money").addEventListener("input", function () {
  let price = getKgPrice();
  let money = parseFloat(this.value);

  if (!price || !money) return;

  let grams = (money / price) * 1000;

  document.getElementById("mwResult").innerText =
    grams.toFixed(0) + " g";
});

/* grams → ₹ */
document.getElementById("grams").addEventListener("input", function () {
  let price = getKgPrice();
  let grams = parseFloat(this.value);

  if (!price || !grams) return;

  let cost = (grams / 1000) * price;

  document.getElementById("wmResult").innerText =
    "₹ " + cost.toFixed(2);
});

/* ENTER FLOW */
document.getElementById("kgPrice").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("money").focus();
});

document.getElementById("money").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("grams").focus();
});

</script>

</body>
</html>
