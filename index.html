<!DOCTYPE html>
<html>
<head>
  <title>Grocery Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 8px;
    }

    h2 {
      text-align: center;
      margin: 8px 0;
    }

    .box {
      background: white;
      padding: 8px;
      border-radius: 6px;
      max-width: 450px;
      margin: 5px auto;   /* very small gap */
    }

    input {
      padding: 10px;
      width: 100%;
      font-size: 16px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      width: 100%;
      font-size: 16px;
      margin-top: 5px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    /* INLINE HEADER ROW */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .title {
      font-weight: bold;
      font-size: 14px;
      white-space: nowrap;
    }

    .result {
      font-weight: bold;
      color: blue;
      font-size: 14px;
      white-space: nowrap;
    }

  </style>
</head>

<body>

<h2>🛒 Grocery Calculator</h2>

<!-- 1 KG PRICE -->
<div class="box">
  <div class="title">1️⃣ 1 KG Price</div>
  <input id="kgPrice" type="number" placeholder="Enter price per kg" />
</div>

<!-- ₹ TO GRAMS -->
<div class="box">
  <div class="row">
    <div class="title">2️⃣ ₹ → Grams</div>
    <div class="result" id="mwResult"></div>
  </div>

  <input id="money" type="number" placeholder="Enter ₹ amount" />
  <button onclick="moneyToWeight()">Calculate</button>
</div>

<!-- GRAMS TO ₹ -->
<div class="box">
  <div class="row">
    <div class="title">3️⃣ Grams → ₹</div>
    <div class="result" id="wmResult"></div>
  </div>

  <input id="grams" type="number" placeholder="Enter grams" />
  <button onclick="weightToMoney()">Calculate</button>
</div>

<script>

function getKgPrice() {
  return parseFloat(document.getElementById("kgPrice").value);
}

/* ₹ → grams */
function moneyToWeight() {
  let price = getKgPrice();
  let money = parseFloat(document.getElementById("money").value);

  if (!price || !money) return;

  let grams = (money / price) * 1000;

  document.getElementById("mwResult").innerText =
    money + " ₹ = " + grams.toFixed(2) + " g";
}

/* grams → ₹ */
function weightToMoney() {
  let price = getKgPrice();
  let grams = parseFloat(document.getElementById("grams").value);

  if (!price || !grams) return;

  let cost = (grams / 1000) * price;

  document.getElementById("wmResult").innerText =
    grams + " g = ₹ " + cost.toFixed(2);
}

/* ENTER KEY FLOW */
document.getElementById("kgPrice").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("money").focus();
});

document.getElementById("money").addEventListener("keydown", e => {
  if (e.key === "Enter") moneyToWeight();
});

document.getElementById("grams").addEventListener("keydown", e => {
  if (e.key === "Enter") weightToMoney();
});

</script>

</body>
</html>
